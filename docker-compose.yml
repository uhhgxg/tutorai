services:
  tutorai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - DATABASE_URL=sqlite:///data/tutorai.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
