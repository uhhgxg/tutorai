version: "3.9"

services:
  tutorai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - DATABASE_URL=sqlite:///data/tutorai.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
