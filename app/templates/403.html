<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 无权限 - TutorAI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            background: var(--bg);
        }
        .error-code { font-size: 6rem; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 8px; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .error-desc { color: var(--text-muted); margin-bottom: 32px; max-width: 400px; }
        .error-actions { display: flex; gap: 12px; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">403</div>
        <h1 class="error-title">无访问权限</h1>
        <p class="error-desc">你没有权限访问此页面，请登录后重试。</p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="/login" class="btn btn-secondary">登录</a>
        </div>
    </div>
</body>
</html>
