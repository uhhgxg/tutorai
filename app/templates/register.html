{% extends "base.html" %}
{% block title %}注册 - TutorAI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>注册</h1>
        <form id="register-form" onsubmit="return false;">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required minlength="2" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="至少8位，包含字母和数字">
            </div>
            <button type="submit" class="btn-primary">注册</button>
            <p class="auth-link">已有账号？<a href="/login">登录</a></p>
        </form>
        <div id="register-error" class="auth-error"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button');
    btn.disabled = true; btn.textContent = '注册中...';
    document.getElementById('register-error').textContent = '';

    try {
        const resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || '注册失败');

        setUserInfo(data.token, data.username);
        showToast('注册成功', 'success');
        window.location.href = '/chat';
    } catch (err) {
        document.getElementById('register-error').textContent = err.message;
    } finally {
        btn.disabled = false; btn.textContent = '注册';
    }
});
</script>
{% endblock %}
